<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mini ERP Frontend</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app-shell">
    <header>
      <h1>Mini ERP Dashboard</h1>
      <p>Manage vendors, orders, and inventory with a simple frontend.</p>
    </header>

    <main>
      <section class="panel" id="vendors-panel">
        <h2>Vendors</h2>
        <form id="vendor-form" class="form-grid">
          <label>
            Name
            <input type="text" id="vendor-name" required placeholder="Vendor name" />
          </label>
          <label>
            Phone
            <input type="text" id="vendor-phone" required placeholder="Phone number" />
          </label>
          <button type="submit" class="primary-button">Create Vendor</button>
        </form>
        <div class="list-card">
          <h3>Vendor List</h3>
          <ul id="vendor-list" class="list"></ul>
        </div>
      </section>

      <section class="panel" id="orders-panel">
        <h2>Orders</h2>
        <form id="order-form" class="form-grid">
          <label>
            Vendor ID
            <input type="number" id="order-vendor-id" required min="1" placeholder="Vendor ID" />
          </label>
          <label>
            Item Name
            <input type="text" id="order-item" required placeholder="Item name" />
          </label>
          <label>
            Quantity
            <input type="number" id="order-quantity" required min="1" placeholder="Quantity" />
          </label>
          <button type="submit" class="primary-button">Create Order</button>
        </form>
        <div class="list-card">
          <h3>Order List</h3>
          <ul id="order-list" class="list"></ul>
        </div>
      </section>

      <section class="panel" id="inventory-panel">
        <h2>Inventory</h2>
        <div class="list-card">
          <h3>Inventory Items</h3>
          <ul id="inventory-list" class="list"></ul>
        </div>
      </section>
    </main>
  </div>

  <script src="script.js"></script>
</body>
</html>
